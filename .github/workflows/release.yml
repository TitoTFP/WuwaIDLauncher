name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install ripgrep
        run: choco install ripgrep -y --no-progress

      - name: Run consistency checks
        run: bash tests/verify_launcher_consistency.sh

      - name: Run unit tests
        run: dotnet test WuwaIDLauncher.Tests/WuwaIDLauncher.Tests.csproj --no-restore --verbosity normal

      - name: Publish (single-file, self-contained)
        run: |
          dotnet publish WuwaIDLauncher.csproj `
            -c Release `
            -o ./publish

      - name: Resolve tag name
        id: tag
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "name=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "name=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create ZIP archive
        run: Compress-Archive -Path ./publish/WuwaIDLauncher.exe -DestinationPath ./WuwaIDLauncher-${{ steps.tag.outputs.name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WuwaIDLauncher ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./WuwaIDLauncher-${{ steps.tag.outputs.name }}.zip
