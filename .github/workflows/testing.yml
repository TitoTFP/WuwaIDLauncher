name: Build Testing Launcher

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-testing:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: choco install ripgrep -y --no-progress

      - name: Run consistency checks
        run: bash tests/verify_launcher_consistency.sh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish testing build
        run: |
          dotnet publish WuwaIDLauncher.csproj `
            -c Release `
            -p:Version=0.0.1 `
            -p:AssemblyVersion=0.0.1.0 `
            -p:FileVersion=0.0.1.0 `
            -p:InformationalVersion=0.0.1 `
            -o ./publish

      - name: Run unit tests
        run: dotnet test WuwaIDLauncher.Tests/WuwaIDLauncher.Tests.csproj --no-restore --verbosity normal

      - name: Upload testing artifact
        uses: actions/upload-artifact@v4
        with:
          name: WuwaIDLauncher-testing-${{ github.run_number }}
          path: ./publish/WuwaIDLauncher.exe
          if-no-files-found: error
          retention-days: 1
